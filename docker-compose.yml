version: "3.9"

services:
  api:
    build: .
    image: lcc:dev
    command: ["server", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /workspace
    environment:
      HOME: /workspace
      LCC_CACHE_DIR: /var/cache/lcc
      LCC_DB_PATH: /workspace/.lcc/lcc.db
      LCC_POLICY_DIR: /workspace/.lcc/policies
      LCC_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace:rw
      - lcc-cache:/var/cache/lcc:rw
    healthcheck:
      test: ["CMD", "lcc", "--version"]
      interval: 1m
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lcc-net

volumes:
  lcc-cache:
    driver: local

networks:
  lcc-net:
    driver: bridge
