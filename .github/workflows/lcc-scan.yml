name: License Compliance Scan

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install License Compliance Checker
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Run license compliance scan
        env:
          LCC_OPA_URL: ${{ secrets.LCC_OPA_URL }}
          LCC_OPA_TOKEN: ${{ secrets.LCC_OPA_TOKEN }}
          LCC_REDIS_URL: ${{ secrets.LCC_REDIS_URL }}
        run: |
          lcc scan . \
            --format json \
            --output lcc-report.json \
            --policy permissive \
            --context saas \
            --threshold 0.7 \
            --exclude "tests/**/*" \
            --exclude "dashboard/**" \
            --exclude "dist/**" \
            --exclude ".git/**"

      - name: Display compliance report on failure
        if: failure()
        run: |
          echo "::group::Compliance Report"
          cat lcc-report.json || echo "Report file not found"
          echo "::endgroup::"

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: lcc-report
          path: lcc-report.json
          if-no-files-found: error

      - name: Fail workflow on policy violations
        run: |
          python - <<'PY'
          import json
          import sys

          report = json.load(open('lcc-report.json', encoding='utf-8'))
          policy_ctx = report.get('summary', {}).get('context', {}).get('policy', {})
          violations = policy_ctx.get('violations', [])
          if violations:
              print('Policy violations detected:', violations)
              sys.exit(2)
          summary_violations = report.get('summary', {}).get('violations', 0)
          if summary_violations:
              print(f'License resolver reported {summary_violations} violation(s).')
              sys.exit(2)
          PY
