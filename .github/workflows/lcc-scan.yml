name: License Compliance Scan

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install License Compliance Checker
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Dashboard
        working-directory: ./dashboard
        run: |
          npm ci
          npm run build


      - name: Run license compliance scan
        env:
          LCC_SECRET_KEY: "ci-scan-key-not-for-production"
          LCC_LLM_PROVIDER: "disabled"
          LCC_OPA_URL: ${{ secrets.LCC_OPA_URL }}
          LCC_OPA_TOKEN: ${{ secrets.LCC_OPA_TOKEN }}
          LCC_REDIS_URL: ${{ secrets.LCC_REDIS_URL }}
        run: |
          lcc scan . \
            --format json \
            --output lcc-report.json \
            --policy permissive \
            --context saas \
            --threshold 0.0 \
            --exclude "tests" \
            --exclude "tests/**" \
            --exclude "dashboard" \
            --exclude "dashboard/**" \
            --exclude "node_modules" \
            --exclude "node_modules/**" \
            --exclude ".next" \
            --exclude ".next/**" \
            --exclude "dist" \
            --exclude "dist/**" \
            --exclude "package/dist" \
            --exclude "package/dist/**" \
            --exclude "package/lib" \
            --exclude "package/lib/**" \
            --exclude ".git" \
            --exclude ".git/**" || true

      - name: Display compliance report on failure
        if: failure()
        run: |
          echo "::group::Compliance Report"
          cat lcc-report.json || echo "Report file not found"
          echo "::endgroup::"

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: lcc-report
          path: lcc-report.json
          if-no-files-found: error

      - name: Report compliance results (warn only — dev deps may include copyleft)
        run: |
          python - <<'PY'
          import json, sys
          try:
              report = json.load(open('lcc-report.json', encoding='utf-8'))
          except Exception as e:
              print(f'Warning: could not read lcc-report.json: {e}')
              sys.exit(0)
          violations = report.get('summary', {}).get('violations', 0)
          components = report.get('summary', {}).get('component_count', 0)
          if violations:
              print(f'::warning::License scan found {violations} violation(s) in {components} components. Review artifact.')
          else:
              print(f'License scan passed: {components} components, 0 violations.')
          PY
