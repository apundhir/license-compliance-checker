# ---------------------------------------------------------------
# Publish to PyPI
# ---------------------------------------------------------------
# Triggered when a version tag (v*) is pushed, or manually via
# workflow_dispatch.  The pipeline runs tests, builds the sdist +
# wheel, and publishes to PyPI using OIDC trusted publishing.
#
# Prerequisites (one-time setup on PyPI):
#   1. Go to https://pypi.org/manage/project/license-compliance-checker/settings/publishing/
#   2. Add a "Trusted Publisher" with:
#        - Owner:      apundhir
#        - Repository: license-compliance-checker
#        - Workflow:    publish-pypi.yml
#        - Environment: pypi
#   If OIDC is not configured, the workflow falls back to
#   secrets.PYPI_TOKEN (classic API token).
# ---------------------------------------------------------------

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # e.g. v1.0.0, v2.3.1
  workflow_dispatch:   # allow manual trigger from Actions tab

# Cancel in-progress runs for the same ref (e.g. rapid re-tags)
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # 1. Test – quick smoke test to make sure the package installs
  # -----------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    # Tests are advisory; we still want to build/publish even if
    # a flaky test fails.  Review the logs before promoting.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Run test suite
        run: pytest -q --disable-warnings tests/ -x

  # -----------------------------------------------------------
  # 2. Build – produce sdist and wheel, upload as artifact
  # -----------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: List built artifacts
        run: ls -lh dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  # -----------------------------------------------------------
  # 3. Publish – push to PyPI using OIDC trusted publishing
  # -----------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # The "pypi" environment provides an additional layer of
    # protection (optional approval gates, deployment logs).
    environment:
      name: pypi
      url: https://pypi.org/project/license-compliance-checker/

    # OIDC trusted publishing requires id-token: write
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: List artifacts to publish
        run: ls -lh dist/

      # ---------------------------------------------------
      # Primary method: OIDC trusted publishing (no secrets)
      # ---------------------------------------------------
      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        # If OIDC is not configured on PyPI, this step will
        # fail and the fallback step below will attempt
        # publication with an API token.

      # NOTE: OIDC trusted publishing is the only supported method.
      # Configure a Trusted Publisher on pypi.org (see header comments).
