# ---------------------------------------------------------------
# Publish to TestPyPI
# ---------------------------------------------------------------
# Triggered when a pre-release tag is pushed (rc or beta).
# Use this to verify the package installs correctly from TestPyPI
# before promoting to production PyPI.
#
#   pip install -i https://test.pypi.org/simple/ license-compliance-checker
#
# Prerequisites (one-time setup on TestPyPI):
#   1. Go to https://test.pypi.org/manage/project/license-compliance-checker/settings/publishing/
#   2. Add a "Trusted Publisher" with:
#        - Owner:      apundhir
#        - Repository: license-compliance-checker
#        - Workflow:    test-pypi.yml
#        - Environment: testpypi
#   If OIDC is not configured, the workflow falls back to
#   secrets.TEST_PYPI_TOKEN (classic API token).
# ---------------------------------------------------------------

name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*-rc*"      # e.g. v1.0.0-rc1, v2.0.0-rc3
      - "v*-beta*"    # e.g. v1.0.0-beta1
  workflow_dispatch:   # allow manual trigger from Actions tab

# Cancel in-progress runs for the same ref
concurrency:
  group: test-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # 1. Build – produce sdist and wheel
  # -----------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: List built artifacts
        run: ls -lh dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  # -----------------------------------------------------------
  # 2. Publish – push to TestPyPI using OIDC trusted publishing
  # -----------------------------------------------------------
  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    # The "testpypi" environment keeps deployment logs separate
    # from production publishes.
    environment:
      name: testpypi
      url: https://test.pypi.org/project/license-compliance-checker/

    # OIDC trusted publishing requires id-token: write
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: List artifacts to publish
        run: ls -lh dist/

      # ---------------------------------------------------
      # Primary method: OIDC trusted publishing (no secrets)
      # ---------------------------------------------------
      - name: Publish to TestPyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      # ---------------------------------------------------
      # Fallback: API token from repository secrets
      # ---------------------------------------------------
      - name: Publish to TestPyPI (API token fallback)
        if: failure() && secrets.TEST_PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
